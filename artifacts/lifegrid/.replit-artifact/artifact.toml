kind = "web"
previewPath = "/"
title = "LifeGrid AI Planner"
version = "1.0.0"
id = "artifacts/lifegrid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26118

[services.development]
run = "pnpm --filter @workspace/lifegrid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifegrid", "run", "build" ]
publicDir = "artifacts/lifegrid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26118"
BASE_PATH = "/"
